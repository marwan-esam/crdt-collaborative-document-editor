name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test_and_verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: |
          echo "SECRET_KEY=dummy_secret_key_for_ci_pipeline" > .env
          echo "DATABASE_URL=postgresql+asyncpg://test:test@postgres:5432/test" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env
      
      - name: Boot the Docker Cluster
        run: docker compose up -d --build

      - name: Wait for Cluster Health
        run: sleep 10

      - name: Execute Pytest Suite
        run: docker compose exec -T api pytest

      - name: Tear Down and Clean Up
        if: always()
        run: docker compose down -v